{% if page.toc_items %}
<details class="post-toc-mobile">
  <summary>{{ page.toc_label | default: "目录" }}</summary>
  <nav class="toc">
    <ul class="toc__menu">
      {% for item in page.toc_items %}
        <li class="toc__item toc__item--level-{{ item.level | default: 2 }}"><a href="#{{ item.id }}">{{ item.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</details>

<aside class="sidebar__right post-toc-sidebar">
  <nav class="toc">
    <header><h4 class="nav__title">{{ page.toc_label | default: "目录" }}</h4></header>
    <ul class="toc__menu">
      {% for item in page.toc_items %}
        <li class="toc__item toc__item--level-{{ item.level | default: 2 }}"><a href="#{{ item.id }}">{{ item.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</aside>
<script>
  (function () {
    function initPostToc() {
      var links = Array.prototype.slice.call(document.querySelectorAll(".post-toc-sidebar .toc__menu a"));
      if (!links.length) return;

      var sections = links.map(function (link) {
        var id = decodeURIComponent(link.getAttribute("href").slice(1));
        return {
          link: link,
          item: link.closest(".toc__item"),
          heading: document.getElementById(id)
        };
      }).filter(function (entry) {
        return entry.heading;
      });

      if (!sections.length) return;

      var ticking = false;

      function setActive(entry) {
        sections.forEach(function (section) {
          section.item.classList.toggle("toc__item--active", section === entry);
          if (section === entry) {
            section.link.setAttribute("aria-current", "true");
          } else {
            section.link.removeAttribute("aria-current");
          }
        });
      }

      function updateActiveSection() {
        var offset = 120;
        var active = sections[0];

        sections.forEach(function (section) {
          if (section.heading.getBoundingClientRect().top <= offset) {
            active = section;
          }
        });

        setActive(active);
        ticking = false;
      }

      function requestUpdate() {
        if (!ticking) {
          window.requestAnimationFrame(updateActiveSection);
          ticking = true;
        }
      }

      updateActiveSection();
      window.addEventListener("scroll", requestUpdate, { passive: true });
      window.addEventListener("resize", requestUpdate);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initPostToc);
    } else {
      initPostToc();
    }
  })();
</script>
{% endif %}
